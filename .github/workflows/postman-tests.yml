name: Run Postman Collection

on:
  push:
    branches:
      - main
      - githubPages
      - alluruReport
  pull_request:
    branches:
      - main
      - githubPages
      - alluruReport
  workflow_dispatch:

permissions:
  contents: write

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 of 3 — Run Newman tests and export raw Allure result files
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  run-tests:
    name: Run Newman Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Allure reporter
        run: npm install -g newman newman-reporter-allure

      - name: Run Postman collection
        run: |
          mkdir -p allure-results
          newman run "Public API.postman_collection.json" \
            --environment "Test Environment.postman_environment.json" \
            --reporters cli,allure \
            --reporter-allure-export allure-results \
            --color on

      - name: Show allure-results contents
        if: always()
        run: |
          echo "=== allure-results ==="
          find allure-results -type f | sort

      - name: Fail if no result files generated
        if: always()
        run: |
          COUNT=$(find allure-results -name "*-result.json" | wc -l)
          echo "Result JSON files found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No Allure result files generated."; exit 1; }

      - name: Upload allure-results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 of 3 — Install allure CLI, restore history, generate HTML report
# ──────────────────────────────────────────────────────────────────────────────
  build-report:
    name: Build Allure Report
    runs-on: ubuntu-latest
    needs: run-tests
    if: always() && needs.run-tests.result != 'skipped'

    steps:
      - name: Download allure-results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Set up Java (required by allure-commandline)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install allure-commandline
        run: npm install -g allure-commandline

      - name: Restore Allure history from gh-pages
        run: |
          mkdir -p allure-results/history
          if git ls-remote --exit-code --heads \
              "https://github.com/${{ github.repository }}.git" gh-pages 2>/dev/null; then
            echo "gh-pages exists — cloning history..."
            git clone --depth 1 --branch gh-pages \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
              gh-pages-clone
            if [ -d gh-pages-clone/history ]; then
              cp -R gh-pages-clone/history/. allure-results/history/
              echo "History restored successfully."
            else
              echo "No history folder found on gh-pages yet."
            fi
          else
            echo "gh-pages branch not found — starting fresh."
          fi

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      - name: Verify index.html was generated
        run: |
          echo "=== allure-report files ==="
          find allure-report -type f | sort | head -40
          test -f allure-report/index.html \
            && echo "index.html OK" \
            || { echo "ERROR: index.html missing"; exit 1; }

      - name: Upload allure-report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 of 3 — Deploy the generated report to GitHub Pages (gh-pages branch)
# ──────────────────────────────────────────────────────────────────────────────
  publish-pages:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-report
    if: >
      needs.build-report.result == 'success' &&
      github.event_name != 'pull_request' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/githubPages' ||
        github.ref == 'refs/heads/alluruReport'
      )

    steps:
      - name: Download allure-report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Confirm index.html is present before deploy
        run: |
          ls -la allure-report/
          test -f allure-report/index.html \
            && echo "index.html confirmed — proceeding with deploy" \
            || { echo "ERROR: index.html missing — aborting deploy"; exit 1; }

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false