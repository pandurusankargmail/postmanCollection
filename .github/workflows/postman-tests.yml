name: Run Postman Collection

on:
  push:
    branches:
      - main
      - githubPages
      - alluruReport
  pull_request:
    branches:
      - main
      - githubPages
      - alluruReport
  workflow_dispatch:

# Required for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 of 3 — Run Newman tests, export raw Allure result files
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  run-tests:
    name: Run Newman Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Allure reporter
        run: npm install -g newman newman-reporter-allure

      - name: Run Postman collection
        run: |
          mkdir -p allure-results
          newman run "Public API.postman_collection.json" \
            --environment "Test Environment.postman_environment.json" \
            --reporters cli,allure \
            --reporter-allure-export allure-results \
            --color on

      - name: Show allure-results contents
        if: always()
        run: |
          echo "=== allure-results ==="
          find allure-results -type f | sort

      - name: Fail if no result files generated
        if: always()
        run: |
          COUNT=$(find allure-results -name "*-result.json" | wc -l)
          echo "Result JSON files found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No Allure result files generated."; exit 1; }

      - name: Upload allure-results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 of 3 — Generate self-contained single-file Allure HTML report
#   --single-file embeds all data inside index.html so GitHub Pages
#   never has to fetch() external JSON files (which causes blank pages)
# ──────────────────────────────────────────────────────────────────────────────
  build-report:
    name: Build Allure Report
    runs-on: ubuntu-latest
    needs: run-tests
    if: always() && needs.run-tests.result != 'skipped'

    steps:
      - name: Download allure-results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Set up Java (required by allure-commandline)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install allure-commandline
        run: npm install -g allure-commandline

      - name: Generate single-file Allure HTML report
        run: |
          allure generate allure-results --clean --single-file -o allure-report
          echo "=== allure-report files ==="
          find allure-report -type f | sort

      - name: Verify index.html was generated and has content
        run: |
          test -f allure-report/index.html \
            && echo "✓ index.html exists" \
            || { echo "ERROR: index.html missing"; exit 1; }
          SIZE=$(wc -c < allure-report/index.html)
          echo "index.html size: $SIZE bytes"
          [ "$SIZE" -gt 50000 ] \
            && echo "✓ index.html has substantial content" \
            || echo "WARNING: index.html looks small ($SIZE bytes) — report may be empty"

      - name: Upload allure-report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 of 3 — Publish to GitHub Pages via Actions deployment
#   No separate gh-pages branch — uses the official Actions Pages flow
#   Repo Pages setting must be: Source = GitHub Actions
# ──────────────────────────────────────────────────────────────────────────────
  publish-pages:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-report
    if: >
      needs.build-report.result == 'success' &&
      github.event_name != 'pull_request' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/githubPages' ||
        github.ref == 'refs/heads/alluruReport'
      )
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download allure-report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Confirm index.html before deploy
        run: |
          ls -la allure-report/
          test -f allure-report/index.html \
            && echo "✓ index.html confirmed — deploying" \
            || { echo "ERROR: index.html missing — aborting"; exit 1; }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4