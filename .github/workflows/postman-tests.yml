name: Run Postman Collection

on:
  push:
    branches:
      - main
      - githubPages
  pull_request:
    branches:
      - main
      - githubPages
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  newman:
    name: Run Newman Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          newman run "Public API.postman_collection.json" \
            --environment "Test Environment.postman_environment.json" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export results/newman-report.html \
            --color on

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: results/newman-report.html

  publish-report:
    name: Publish Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: newman
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/githubPages')

    steps:
      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: newman-report
          path: results

      - name: Add index.html redirect
        run: |
          cp results/newman-report.html results/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: results
          destination_dir: .
          commit_message: "docs: update Newman test report [skip ci]"
