name: Run Postman Collection

on:
  push:
    branches:
      - main
      - githubPages
      - alluruReport

  pull_request:
    branches:
      - main
      - githubPages
      - alluruReport

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  newman:
    name: Run Newman Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Allure tools
        run: npm install -g newman newman-reporter-allure allure-commandline

      - name: Run Postman collection
        run: |
          newman run "Public API.postman_collection.json" \
            --environment "Test Environment.postman_environment.json" \
            --reporters cli,allure \
            --color on

      - name: Debug - list allure-results
        if: always()
        run: |
          echo "=== allure-results contents ==="
          ls -la allure-results/ || echo "allure-results directory not found"

      - name: Set Allure Environment
        if: always()
        run: |
          echo "Browser=Chrome" >> allure-results/environment.properties
          echo "Environment=Staging" >> allure-results/environment.properties
          echo "Runner=GitHub Actions" >> allure-results/environment.properties

      - name: Set Allure Categories
        if: always()
        run: |
          cat <<'EOF' > allure-results/categories.json
          [
            {
              "name": "Passed Tests",
              "matchedStatuses": ["passed"]
            },
            {
              "name": "Failed Tests",
              "matchedStatuses": ["failed"]
            }
          ]
          EOF

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results --clean --single-file -o allure-report
          echo "=== Allure report generated ==="
          find allure-report -type f | head -20

      - name: Debug - list allure-report
        if: always()
        run: |
          echo "=== allure-report root ==="
          ls -la allure-report/
          echo "=== allure-report data ==="
          ls -la allure-report/data/ 2>/dev/null || echo "data directory not found"
          echo "=== checking index.html ==="
          test -f allure-report/index.html && echo "✓ index.html EXISTS" || echo "✗ index.html MISSING"
          echo "=== checking app.js ==="
          test -f allure-report/app.js && echo "✓ app.js EXISTS" || echo "✗ app.js MISSING"

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

  publish-report:
    name: Publish Report to GitHub Pages
    runs-on: ubuntu-latest
    needs: newman
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/githubPages' || github.ref == 'refs/heads/alluruReport')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: pages-site

      - name: Verify report contents
        run: |
          echo "=== Current directory contents ==="
          ls -la
          echo "=== Pages site contents ==="
          ls -la pages-site
          echo "=== Checking for index.html ==="
          test -f pages-site/index.html && echo "✓ index.html found" || echo "✗ index.html NOT found"
          echo "=== Checking single-file Allure markers ==="
          grep -q "allure" pages-site/index.html && echo "✓ embedded Allure content found" || echo "✗ embedded Allure content missing"

      - name: Create .nojekyll file
        run: touch pages-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
