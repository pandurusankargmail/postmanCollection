name: Run Postman Collection

on:
  push:
    branches:
      - main
      - githubPages
      - alluruReport
  pull_request:
    branches:
      - main
      - githubPages
      - alluruReport
  workflow_dispatch:

permissions:
  contents: write

jobs:
  newman:
    name: Run Newman Tests and Export Allure Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Allure reporter
        run: npm install -g newman newman-reporter-allure

      - name: Run Postman collection
        run: |
          mkdir -p allure-results
          newman run "Public API.postman_collection.json" \
            --environment "Test Environment.postman_environment.json" \
            --reporters cli,allure \
            --reporter-allure-export allure-results \
            --color on

      - name: Validate Allure results are generated
        if: always()
        run: |
          RESULT_COUNT=$(find allure-results -maxdepth 1 -name "*-result.json" | wc -l)
          echo "Allure result files: $RESULT_COUNT"
          if [ "$RESULT_COUNT" -eq 0 ]; then
            echo "No Allure result files generated."
            exit 1
          fi

      - name: Upload Allure raw results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

  publish-report:
    name: Build Consolidated Allure Report and Publish
    runs-on: ubuntu-latest
    needs: newman
    if: needs.newman.result == 'success' && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/githubPages' || github.ref == 'refs/heads/alluruReport')

    steps:
      - name: Download Allure raw results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Checkout gh-pages branch (for history)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: allure-history

      - name: Ensure history directory exists
        run: mkdir -p allure-history

      - name: Build consolidated Allure report with history
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy consolidated report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history